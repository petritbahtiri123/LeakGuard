name: Browser Nightly

on:
  workflow_dispatch:
  schedule:
    - cron: "40 4 * * *"

permissions:
  contents: read

jobs:
  browser-gates:
    name: Tier C browser/nightly checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Setup Edge
        uses: browser-actions/setup-edge@v1

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run complete nightly matrix
        run: xvfb-run -a npm run test:nightly

      - name: Upload browser smoke timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-nightly-smoke-timings
          path: artifacts/runtime-budgets/smoke-timings.jsonl
          if-no-files-found: warn
          retention-days: 14
