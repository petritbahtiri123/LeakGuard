name: Tests

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Run JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Generate supply-chain reports
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/supply-chain
          npm sbom --sbom-format cyclonedx --json > artifacts/supply-chain/sbom.cdx.json
          npm run report:licenses -- --output-dir artifacts/supply-chain
          npm run report:osv -- --output-dir artifacts/supply-chain
          npm run scan:repo-secrets -- --output-dir artifacts/supply-chain

      - name: Upload supply-chain reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain-reports
          path: artifacts/supply-chain/
          if-no-files-found: warn
          retention-days: 14

      - name: Check documentation links
        run: npm run docs:check-links

      - name: Run Tier A fast PR checks
        run: npm run test:ci

      - name: Generate runtime size report
        run: npm run report:sizes -- --output-dir artifacts/runtime-budgets

      - name: Upload runtime size report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-size-report
          path: artifacts/runtime-budgets/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload browser smoke timings
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: browser-smoke-timings
          path: artifacts/runtime-budgets/smoke-timings.jsonl
          if-no-files-found: warn
          retention-days: 14

  deterministic-e2e:
    name: Deterministic Chromium E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2

      - name: Install dependencies
        run: npm ci

      - name: Build Chrome extension
        run: npm run build:chrome

      - name: Run deterministic full-feature E2E
        run: xvfb-run -a npm run test:e2e
