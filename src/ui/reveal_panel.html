<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LeakGuard Secure Reveal</title>
    <link rel="stylesheet" href="reveal_panel.css">
  </head>
  <body>
    <main class="panel">
      <p class="eyebrow">LeakGuard Secure Reveal</p>
      <h1>Inspect redacted content</h1>
      <p class="status" id="status">Loading secure context…</p>
      <div class="placeholder" id="placeholder">[PWM]</div>
      <div class="secret-shell">
        <p class="hidden-copy" id="hidden-copy">Hidden until you choose Show.</p>
        <pre class="secret-value" id="secret-value" hidden></pre>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="show-btn" type="button">Show</button>
        <button class="btn" id="hide-btn" type="button" disabled>Hide</button>
      </div>
    </main>
    <script src="../compat/browser_api.js"></script>
    <script src="../compat/platform.js"></script>
    <script src="reveal_panel.js"></script>
  </body>
</html>
